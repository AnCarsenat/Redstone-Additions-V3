site_name: Redstone Additions V3
site_description: Redstone Additions V3 documentation for players and contributors
site_url: https://ancarsenat.github.io/Redstone-Additions-V3/
repo_url: https://github.com/AnCarsenat/Redstone-Additions-V3
repo_name: AnCarsenat/Redstone-Additions-V3
docs_dir: docs
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid.js

strict: true

nav:
  - Home: index.md
  - Gameplay Modules:
      - Logic Gates: logic-gates.md
      - Interactive Machines: interactive-machines.md
      - Sensors: sensors.md
      - Wireless Redstone: wireless-redstone.md
      - Transport Networks: transport-networks.md
      - Chunk Loader: chunk-loader.md
      - Multiblocks: multiblocks.md
  - Technical Foundation:
      - How It Works: how-it-works.md
      - Block Reference: block-reference.md
      - Recipe Reference: recipe-reference.md
  - For Developers:
      - Developer Guide: developer-guide.md
      - Extension Examples: extension-examples.md
      - Contributing Guidelines: contributing-guidelines.md
  - Project:
      - Changelog: changelog.md
